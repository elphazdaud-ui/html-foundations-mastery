<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>graphics using html File</title>
  </head>
  <body>
    <h1>demo on how to use functional SVG elements</h1>
    <svg width="200" height="150" xmlns="http://www.w3.org/2000/svg">
      <!-- Rectangle -->
      <rect
        x="10"
        y="10"
        width="80"
        height="50"
        fill="lightblue"
        stroke="blue"
        stroke-width="2"
      />

      <!-- Circle -->
      <circle
        cx="150"
        cy="50"
        r="30"
        fill="lightgreen"
        stroke="green"
        stroke-width="3"
      />
    </svg>
  </body>
</html>
