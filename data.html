<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="This is a sample webpage demonstrating HTML semantic elements, images, videos, tables, forms, and links."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Fundamentals on rowspan and colspan usage</title>
  </head>
  <body>
    <h1>Weekly Schedule...</h1>

    <table border="1" cellpadding="8" cellspacing="0">
      <tr>
        <th>Day</th>
        <th colspan="2">Morning</th>
        <th>Afternoon</th>
      </tr>
      <tr>
        <td rowspan="2">Monday</td>
        <td>coding</td>
        <td>prayers</td>
        <td>meditations</td>
      </tr>
      <tr>
        <td colspan="2">journaling</td>
        <td>self-determination</td>
      </tr>
      <tr>
        <td>Tuesday</td>
        <td colspan="2">deep work</td>
        <td>workouts</td>
      </tr>
    </table>
  </body>
</html>
