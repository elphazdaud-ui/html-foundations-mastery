<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>profile document</title>
  </head>
  <body>
    <h1>
      The following is an example of how user profiles' forms on web pages are
      designed
    </h1>
    <form>
      <!-- Personal Info Group -->
      <fieldset>
        <legend>Personal Information</legend>

        <label for="name">Name:</label>
        <input
          type="text"
          id="name"
          name="name"
          required
          minlength="3"
          placeholder="Your name"
        />
        <br /><br />

        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="Your email"
        />
        <br /><br />

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="1" max="120" required />
      </fieldset>

      <br />

      <!-- Account Info Group -->
      <fieldset>
        <legend>Account Details</legend>

        <label for="username">Username:</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          minlength="5"
          pattern="[A-Za-z0-9]+"
        />
        <br /><br />

        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="6"
        />
      </fieldset>

      <br />

      <button type="submit">Submit</button>
    </form>
  </body>
</html>
