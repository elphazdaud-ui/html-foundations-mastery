<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validation Form</title>
  </head>
  <body>
    <h1>
      The following is an example on how validation form is designed on html
      document
    </h1>
    <form>
      <label for="username">Username:</label>
      <input
        type="text"
        id="username"
        name="username"
        required
        minlength="5"
        pattern="[A-Za-z0-9]+"
        placeholder="Enter username (letters & numbers only)"
      />

      <br /><br />

      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        required
        placeholder="Enter your email"
      />

      <br /><br />

      <button type="submit">Submit</button>
    </form>
  </body>
</html>
