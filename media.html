<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>image and video tag usage</title>
  </head>
  <body>
    <h1>How to use img and video tag on web layout</h1>
    <img
      src="https://plus.unsplash.com/premium_photo-1663954862772-a29434a37222?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      alt="A scenic view of mountains"
      width="600"
      height="400"
    />
    <video
      src="https://images.unsplash.com/file-1705123271268-c3eaf6a79b21image?w=416&dpr=2&auto=format&fit=crop&q=60"
      controls
      width="600"
      height="400"
    ></video>
  </body>
</html>
